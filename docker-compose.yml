services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: template
      POSTGRES_PASSWORD: template
      POSTGRES_DB: template
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U template"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
